name: Metrics
on:
  schedule:
    - cron: "0 0 * * *" # Executa uma vez por dia
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }} # Você precisará criar um Personal Access Token

          # Configurações do layout
          user: Healer101015
          template: classic
          base: header, activity, community, repositories, metadata
          
          # Adicionando o "jogo" de conquistas (Habitants/Isometric view)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          # Plugin de Linguagens (mostra o que você mais usa)
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          
          # Plugin de Conquistas (estilo medalhas de jogo)
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
